{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-header">
                <h4 class="mb-0">Meus Dados de Acesso</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">E-mail</label>
                        <input type="E-mail" name="E-mail" class="form-control" value="{{ user.email }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Nova Senha (deixe em branco para não alterar)</label>
                        <input type="Senha" name="Senha" class="form-control">
                    </div>
                    <div class="mb-3 form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="email_notifications" name="email_notifications" {% if user.email_notifications_enabled %}checked{% endif %}>
                        <label class="form-check-label" for="email_notifications">Receber notificações por e-mail</label>
                    </div>
                    
                    <hr>
                    <h5 class="mb-3">Dados Profissionais</h5>
                    
                    <div class="mb-3">
                        <label class="form-label">Nome Completo</label>
                        <input type="text" name="full_name" class="form-control" value="{{ user.profile.full_name or '' }}" {% if current_user.role != 'admin' %}readonly{% endif %}>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Matrícula</label>
                            <input type="text" name="registration_number" class="form-control" value="{{ user.profile.registration_number or '' }}" {% if current_user.role != 'admin' %}readonly{% endif %}>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">CPF</label>
                            <input type="text" name="cpf" class="form-control" value="{{ user.profile.cpf or '' }}" {% if current_user.role != 'admin' %}readonly{% endif %}>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Secretaria</label>
                        <input type="text" name="secretariat" class="form-control" value="{{ user.profile.secretariat or '' }}" {% if current_user.role != 'admin' %}readonly{% endif %}>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Departamento</label>
                            <input type="text" name="department" class="form-control" value="{{ user.profile.department or '' }}" {% if current_user.role != 'admin' %}readonly{% endif %}>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Cargo</label>
                            <input type="text" name="position" class="form-control" value="{{ user.profile.position or '' }}" {% if current_user.role != 'admin' %}readonly{% endif %}>
                        </div>
                    </div>

                    <hr>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary text-white">Salvar Alterações</button>
                        <a href="{{ url_for('dashboard') }}" class="btn btn-light">Voltar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

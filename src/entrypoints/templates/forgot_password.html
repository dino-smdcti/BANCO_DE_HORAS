{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-body p-5">
                <h3 class="text-center mb-4">Esqueci minha senha</h3>
                <p class="text-muted text-center mb-4">Insira seu e-mail cadastrado para receber as instruções de recuperação.</p>
                <form method="POST">
                    <div class="mb-3">
                        <label for="email" class="form-label">E-mail</label>
                        <input type="email" name="email" class="form-control" required placeholder="seu@email.com">
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">Enviar Link de Recuperação</button>
                        <a href="{{ url_for('login') }}" class="btn btn-link text-secondary">Voltar para o Login</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

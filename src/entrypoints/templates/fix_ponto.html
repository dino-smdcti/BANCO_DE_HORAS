{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-white">
                <h4 class="mb-0">Correção Manual de Ponto</h4>
                <p class="text-muted small">Funcionário: {{ employee.profile.full_name or Funcionário.email }}</p>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Data do Registro</label>
                        <input type="date" name="entry_date" class="form-control" value="{{ request.args.get('date') or today }}" required>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Chegada</label>
                            <input type="text" name="arrival" class="form-control" placeholder="00:00">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Saída Almoço</label>
                            <input type="text" name="lunch_start" class="form-control" placeholder="00:00">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Volta Almoço</label>
                            <input type="text" name="lunch_end" class="form-control" placeholder="00:00">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Fim Jornada</label>
                            <input type="text" name="departure" class="form-control" placeholder="00:00">
                        </div>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-warning">Salvar Alterações</button>
                        <a href="{{ url_for('dashboard') }}" class="btn btn-light">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

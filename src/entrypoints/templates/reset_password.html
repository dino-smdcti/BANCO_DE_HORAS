{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-body p-5">
                <h3 class="text-center mb-4">Nova Senha</h3>
                <form method="POST">
                    <div class="mb-3">
                        <label for="Senha" class="form-label">Digite sua nova senha</label>
                        <input type="Senha" name="Senha" class="form-control" required minlength="6">
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">Atualizar Senha</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

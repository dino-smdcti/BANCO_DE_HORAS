{% extends "base.html" %}

{% block content %}
<div class="p-5 mb-4 bg-light rounded-3 shadow-sm text-center">
    <div class="container-fluid py-5">
        <h1 class="display-5 fw-bold">Sistema de Banco de Horas</h1>
        <p class="col-md-12 fs-4 text-muted">Gestão eficiente de tempo para funcionários e gestores.</p>
        <hr class="my-4">
        {% if not current_user.is_authenticated %}
            <div class="d-flex justify-content-center gap-3">
                <a href="{{ url_for('login') }}" class="btn btn-primary btn-lg px-4">Login do Sistema</a>
            </div>
        {% else %}
            <a href="{{ url_for('dashboard') }}" class="btn btn-primary btn-lg px-4">Acessar Meu Painel</a>
        {% endif %}
    </div>
</div>
{% endblock %}
